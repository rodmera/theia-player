name: Build and Release Standalone Binaries

on:
  push:
    tags:
      - "v*" # Gatilla de forma automatizada ante la creacion de un tag de version, ej: v1.0.0

permissions:
  contents: write # Permiso de escritura obligatorio para poder adjuntar assets a las Releases de GitHub

jobs:
  build:
    name: Build Standalone Binary on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            binary_name: theia-player-linux-amd64
          - os: macos-latest
            platform: macos-arm64
            binary_name: theia-player-macos-arm64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev pkg-config

      - name: Install System Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # Install mpv C-engine to ensure PyInstaller resolves dynamic links during freeze
          brew install mpv pkg-config

      - name: Create Virtual Environment and Install theia-player
        run: |
          python3 -m venv .venv
          # Installs dependencies dynamically based on OS platform (including PyObjC on macOS)
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[full]"

      - name: Compile Standalone Binary with PyInstaller
        run: |
          # Runs our custom optimized packaging script
          .venv/bin/python tools/package_mac.py

      - name: Rename Output Binary for Platform Clarity
        run: |
          # Renames the generic "theia-player" output to its specific platform name for release assets
          mkdir -p dist_release
          mv dist/theia-player dist_release/${{ matrix.binary_name }}

      - name: Upload Build Artifacts (Pre-Release check)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: dist_release/${{ matrix.binary_name }}

  release:
    name: Create GitHub Release and Upload Assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: theia-player-linux-amd64
          path: dist_release

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: theia-player-macos-arm64
          path: dist_release

      - name: Create GitHub Release and Attach Standalone Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist_release/theia-player-linux-amd64
            dist_release/theia-player-macos-arm64
          draft: false
          prerelease: false
          generate_release_notes: true # Generates change notes based on git commit history automatically
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
